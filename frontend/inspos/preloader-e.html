<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snapwise — Preloader E: The Screenshot</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04020A;
  --primary:#7F0DF2;
  --primary-g:rgba(127,13,242,0.12);
  --border:rgba(127,13,242,0.2);
  --border-s:rgba(255,255,255,0.05);
  --text:#EDE8F5;
  --muted:#7A6E8A;
  --dim:#2A2235;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Jost',sans-serif;color:var(--text);}

/* ── PRELOADER ── */
#preloader{
  position:fixed;inset:0;z-index:1000;
  background:#06040C;
  overflow:hidden;
}

/* Ambient desktop bg */
.pre-ambient{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 40%, rgba(127,13,242,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 70% 60%, rgba(90,8,176,0.05) 0%, transparent 60%);
}
/* Subtle dot grid */
.pre-grid{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(127,13,242,0.08) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.5;
}

/* Fake "desktop" content fragments - blurred to feel ambient */
.pre-desktop-frag{
  position:absolute;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.03);
  filter:blur(0.5px);
}
.frag-1{width:320px;height:200px;top:15%;left:8%;border-radius:2px;}
.frag-2{width:240px;height:300px;top:10%;right:12%;border-radius:2px;}
.frag-3{width:400px;height:60px;top:45%;left:50%;transform:translateX(-50%);border-radius:2px;}
.frag-4{width:180px;height:180px;bottom:15%;left:20%;border-radius:2px;}
.frag-5{width:280px;height:160px;bottom:20%;right:18%;border-radius:2px;}

/* Centered logo during load */
.pre-logo{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  z-index:10;
}
.pre-mark{
  width:40px;height:40px;
  display:grid;grid-template-columns:1fr 1fr;gap:3px;
  opacity:0;
  animation:mark-in 0.6s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
}
.pre-mark span{
  display:block;
  border:1px solid var(--primary);
  transition:background 0.3s;
}
.pre-mark span:nth-child(1){background:var(--primary);animation:sq-fill 0.15s 0.9s forwards;}
.pre-mark span:nth-child(2){animation:sq-fill 0.15s 1.05s forwards;}
.pre-mark span:nth-child(3){animation:sq-fill 0.15s 1.1s forwards;}
.pre-mark span:nth-child(4){background:rgba(127,13,242,0.4);animation:sq-fill2 0.15s 1.2s forwards;}
@keyframes sq-fill{to{background:var(--primary);}}
@keyframes sq-fill2{to{background:var(--primary);box-shadow:0 0 12px var(--primary);}}
@keyframes mark-in{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}

.pre-wordmark{
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.35em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;
  animation:fade-in 0.5s 0.8s forwards;
}
.pre-status{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--dim);
  opacity:0;
  animation:fade-in 0.5s 1s forwards;
}
@keyframes fade-in{to{opacity:1;}}

/* ── SHUTTER MECHANICS ── */
/* The shutter is a full-viewport flash system */
#shutter{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:20;
}

/* Screenshot border flash - four white bars from edges */
.shutter-edge{
  position:absolute;
  background:#fff;
  opacity:0;
}
.shutter-top{top:0;left:0;right:0;height:3px;}
.shutter-bottom{bottom:0;left:0;right:0;height:3px;}
.shutter-left{top:0;left:0;bottom:0;width:3px;}
.shutter-right{top:0;right:0;bottom:0;width:3px;}

/* White flash overlay */
#flash-overlay{
  position:absolute;inset:0;
  background:#ffffff;
  opacity:0;
  pointer-events:none;
  z-index:25;
}

/* Screenshot border that lingers */
#ss-border{
  position:absolute;
  inset:12px;
  border:2px solid rgba(255,255,255,0.9);
  opacity:0;
  z-index:24;
  box-shadow:0 0 0 4000px rgba(255,255,255,0.0);
}

/* ── HERO (hidden initially) ── */
#hero{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
  padding:120px 40px;
  overflow:hidden;
  opacity:0;
}

.hero-orb{
  position:absolute;border-radius:50%;
  pointer-events:none;filter:blur(100px);
}
.hero-orb-1{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(127,13,242,0.22) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(127,13,242,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(127,13,242,0.04) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
}
.hero-eyebrow{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--primary);margin-bottom:28px;
  display:flex;align-items:center;gap:16px;
  opacity:0;transform:translateY(20px);
  transition:all 0.8s cubic-bezier(0.16,1,0.3,1);
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:32px;height:1px;background:var(--primary);opacity:0.5;}
.hero-headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(64px,10vw,140px);
  font-weight:300;line-height:0.92;letter-spacing:-0.02em;
  margin-bottom:32px;
  opacity:0;transform:translateY(30px);
  transition:all 1s 0.1s cubic-bezier(0.16,1,0.3,1);
}
.hero-headline em{color:var(--primary);font-style:italic;}
.hero-sub{
  font-size:18px;font-weight:300;color:var(--muted);
  max-width:480px;line-height:1.85;margin-bottom:48px;
  opacity:0;transform:translateY(24px);
  transition:all 0.9s 0.2s cubic-bezier(0.16,1,0.3,1);
}
.hero-btn{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.25em;text-transform:uppercase;
  background:var(--primary);color:#fff;border:none;
  padding:16px 48px;cursor:pointer;
  box-shadow:0 0 32px rgba(127,13,242,0.35);
  opacity:0;transform:translateY(20px);
  transition:all 0.8s 0.3s cubic-bezier(0.16,1,0.3,1);
}
#hero.revealed .hero-eyebrow,
#hero.revealed .hero-headline,
#hero.revealed .hero-sub,
#hero.revealed .hero-btn{
  opacity:1;transform:translateY(0);
}

/* Grain */
#grain{
  position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
</style>
</head>
<body>
<div id="grain"></div>

<!-- PRELOADER -->
<div id="preloader">
  <div class="pre-ambient"></div>
  <div class="pre-grid"></div>

  <!-- Ambient desktop fragments -->
  <div class="pre-desktop-frag frag-1"></div>
  <div class="pre-desktop-frag frag-2"></div>
  <div class="pre-desktop-frag frag-3"></div>
  <div class="pre-desktop-frag frag-4"></div>
  <div class="pre-desktop-frag frag-5"></div>

  <!-- Logo -->
  <div class="pre-logo">
    <div class="pre-mark">
      <span></span><span></span>
      <span></span><span></span>
    </div>
    <div class="pre-wordmark">Snapwise</div>
    <div class="pre-status">Loading intelligence</div>
  </div>

  <!-- Shutter system -->
  <div id="shutter">
    <div class="shutter-edge shutter-top" id="sh-top"></div>
    <div class="shutter-edge shutter-bottom" id="sh-bot"></div>
    <div class="shutter-edge shutter-left" id="sh-left"></div>
    <div class="shutter-edge shutter-right" id="sh-right"></div>
  </div>
  <div id="ss-border"></div>
  <div id="flash-overlay"></div>
</div>

<!-- HERO -->
<div id="hero">
  <div class="hero-grid"></div>
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-eyebrow">Screenshot Intelligence</div>
  <h1 class="hero-headline">Your saves,<br/>finally <em>read.</em></h1>
  <p class="hero-sub">Snapwise extracts meaning from every screenshot — automatically sorted, permanently retrievable, entirely yours.</p>
  <button class="hero-btn">Start Organizing</button>
</div>

<script>
// Timeline (ms):
// 0      — preloader visible, logo animates in
// 1400   — shutter fires: edge bars flash in simultaneously
// 1450   — white flash hits full opacity
// 1500   — screenshot border appears
// 1650   — flash begins fading
// 1900   — hero starts becoming visible behind fading flash
// 2100   — preloader slides out / fades
// 2200   — hero elements animate in

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

async function runPreloader() {
  const preloader   = document.getElementById('preloader');
  const flashOv     = document.getElementById('flash-overlay');
  const ssBorder    = document.getElementById('ss-border');
  const shTop       = document.getElementById('sh-top');
  const shBot       = document.getElementById('sh-bot');
  const shLeft      = document.getElementById('sh-left');
  const shRight     = document.getElementById('sh-right');
  const hero        = document.getElementById('hero');

  await delay(1400);

  // ── SHUTTER FIRES ──
  // Edge bars flash simultaneously
  [shTop,shBot,shLeft,shRight].forEach(el => {
    el.style.transition = 'opacity 0.04s ease';
    el.style.opacity = '1';
  });

  // White flash
  flashOv.style.transition = 'opacity 0.06s ease';
  flashOv.style.opacity = '1';

  await delay(60);

  // Screenshot border appears
  ssBorder.style.transition = 'opacity 0.05s ease';
  ssBorder.style.opacity = '1';

  // Edge bars fade
  [shTop,shBot,shLeft,shRight].forEach(el => {
    el.style.transition = 'opacity 0.15s ease';
    el.style.opacity = '0';
  });

  await delay(80);

  // Flash holds for a beat — feels like a real screenshot
  // Then slowly dissolves

  // Hero becomes visible underneath
  hero.style.opacity = '1';
  hero.style.transition = 'opacity 0s'; // instant, flash will cover it

  await delay(120);

  // Flash dissolves slowly
  flashOv.style.transition = 'opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
  flashOv.style.opacity = '0';

  // SS border fades with it
  ssBorder.style.transition = 'opacity 0.5s 0.1s ease';
  ssBorder.style.opacity = '0';

  await delay(300);

  // Preloader itself fades behind the dissolving flash
  preloader.style.transition = 'opacity 0.6s ease';
  preloader.style.opacity = '0';

  await delay(400);

  // Preloader gone
  preloader.style.display = 'none';
  document.body.style.overflow = '';

  // Hero content reveals
  hero.classList.add('revealed');
}

document.body.style.overflow = 'hidden';
runPreloader();
</script>
</body>
</html>
