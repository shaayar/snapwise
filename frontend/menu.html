<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f0df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0a050d",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },

        }
    </script>
<style type="text/tailwindcss">
        .nebula-bg {
            background: radial-gradient(circle at 50% 50%, rgba(127, 13, 242, 0.15) 0%, rgba(10, 5, 13, 1) 70%);
        }
        .grainy-filter {
            filter: contrast(150%) brightness(100%);
            mix-blend-mode: overlay;
            opacity: 0.1;
        }
        .floating-orb {
            filter: blur(80px);
            background: linear-gradient(135deg, #7f0df2 0%, #362249 100%);
        }.nav-container:hover .nav-item {
            opacity: 0.4;
            transform: scale(0.75);
        }
        .nav-container .nav-item:hover {
            opacity: 1;
            transform: scale(1.5);
            z-index: 20;
        }
        .nav-item {
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            transform-origin: left center;
        }
    </style>
