<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Screenshots - Screenshot Intelligence</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
    }

    input[type="file"] {
      margin: 20px 0;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.85;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
      background: #fafafa;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    .preview {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .preview img {
      width: 100%;
      height: auto;
      display: block;
    }

    .feedback-section {
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      text-align: left;
    }

    .category-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin: 15px 0;
    }

    .category-option {
      padding: 10px 15px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      min-width: 120px;
      text-align: center;
      transform: scale(1);
    }

    .category-option:hover {
      border-color: #007bff;
      background: #f8f9ff;
    }

    .category-option.selected {
      border-color: #28a745;
      background: #d4edda;
      font-weight: bold;
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
      transition: all 0.2s ease;
    }

    .category-option .confidence {
      font-size: 11px;
      color: #666;
      display: block;
      margin-top: 3px;
    }

    .custom-category {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #f8f9fa;
      border: 2px dashed #dee2e6;
      border-radius: 8px;
    }

    .feedback-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .feedback-btn {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .feedback-btn:hover {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }

    .feedback-btn.correct {
      background: #28a745;
      color: white;
      border-color: #28a745;
    }

    .feedback-btn.incorrect {
      background: #dc3545;
      color: white;
      border-color: #dc3545;
    }
  </style>
</head>
<body>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1>Upload Screenshots</h1>
      <button onclick="window.location.href='index.html'" style="background: #6c757d;">← Back</button>
    </div>
    
    <input type="file" id="fileInput" accept="image/*" multiple/>
    <br />
    <button onclick="uploadFile()">Upload & Analyze</button>
    <button onclick="viewMyList()" style="margin-left: 10px; background: #007bff;">📋 My List</button>
    <button onclick="viewMyCategories()" style="margin-left: 10px; background: #6f42c1;">🏷️ Categories</button>

    <div id="previewContainer" style="margin-top:20px;"></div>
    <div class="result" id="resultBox" style="display:none;"></div>
    <div id="feedbackContainer"></div>
  </div>

<script>
  let selectedCategories = {};

  function formatCategoryName(category) {
    const names = {
      'watch_later': '🎬 Watch Later',
      'read_later': '📚 Read Later', 
      'buy_later': '🛒 Buy Later',
      'saved_links': '🔗 Saved Links',
      'listen_later': '🎵 Listen Later',
      'events': '📅 Events',
      'unsorted': '📁 Unsorted'
    };
    return names[category] || category;
  }

  async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const resultBox = document.getElementById("resultBox");
    const previewContainer = document.getElementById("previewContainer");
    const feedbackContainer = document.getElementById("feedbackContainer");

    if (!fileInput.files.length) {
      alert("Please select a screenshot first.");
      return;
    }

    const formData = new FormData();
    Array.from(fileInput.files).forEach(file => {
      formData.append("screenshots", file);
    });

    try {
      const response = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      
      // Clear other sections
      previewContainer.innerHTML = "";
      feedbackContainer.innerHTML = "";
      
      resultBox.innerHTML = "✅ Upload successful! Processing results...";
      resultBox.style.display = "block";

      // Show feedback options after a short delay
      setTimeout(() => {
        showFeedbackOptions(data.results);
        resultBox.style.display = "none";
      }, 1000);

    } catch (error) {
      console.error("Upload error:", error);
      resultBox.innerHTML = `❌ Upload error: ${error.message}`;
      resultBox.style.display = "block";
    }
  }

  function showFeedbackOptions(results) {
    const feedbackContainer = document.getElementById("feedbackContainer");
    feedbackContainer.innerHTML = "";

    results.forEach((result, index) => {
      const feedbackSection = document.createElement("div");
      feedbackSection.className = "feedback-section";
      
      // Create category options HTML
      const categoryOptions = result.topCategories.map(cat => {
        const isSelected = cat.category === result.category;
        const showCustomInput = cat.isCustom || (cat.category === "unsorted" && cat.confidence === 0);
        
        if (showCustomInput) {
          return `
            <div class="category-option custom-category">
              <input type="text" 
                     id="custom-category-${result.id}" 
                     placeholder="Type new category..." 
                     style="width: 150px; padding: 5px; margin-right: 10px; border: 1px solid #ddd; border-radius: 4px;">
              <button onclick="selectCustomCategory(${result.id})" 
                      style="padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Add Custom
              </button>
            </div>
          `;
        }
        
        return `
          <div class="category-option ${isSelected ? 'selected' : ''}" 
               onclick="selectCategory(${result.id}, '${cat.category}', this)"
               data-category="${cat.category}">
            ${formatCategoryName(cat.category)}
            <span class="confidence">confidence: ${cat.confidence}</span>
          </div>
        `;
      }).join('');

      feedbackSection.innerHTML = `
        <strong>File: ${result.file}</strong><br>
        <div style="margin: 10px 0;">
          <strong>Choose the correct category:</strong>
        </div>
        <div class="category-options">
          ${categoryOptions}
        </div>
        <div style="margin-top: 15px;">
          <button class="feedback-btn" onclick="submitCategoryChoice(${result.id})">
            Add to My List
          </button>
          <div id="confirmation-${result.id}" style="display:none; margin-top:10px; color:green; font-weight:bold;">
            ✓ Added to your list!
          </div>
        </div>
      `;

      feedbackContainer.appendChild(feedbackSection);
    });
  }

  function selectCategory(resultId, category, element) {
    const parent = element.parentElement;
    parent.querySelectorAll('.category-option').forEach(opt => {
      opt.classList.remove('selected');
    });
    
    element.classList.add('selected');
    selectedCategories[resultId] = category;
  }

  function selectCustomCategory(resultId) {
    const customInput = document.getElementById(`custom-category-${resultId}`);
    const customCategory = customInput.value.trim();
    
    if (!customCategory) {
      alert("Please enter a category name");
      return;
    }
    
    selectedCategories[resultId] = customCategory;
    
    const customDiv = customInput.parentElement;
    customDiv.innerHTML = `
      <div class="category-option selected" style="background: #e3f2fd; border-color: #2196f3;">
        🏷️ ${customCategory}
        <span class="confidence">custom category</span>
      </div>
    `;
  }

  async function submitCategoryChoice(resultId) {
    const selectedCategory = selectedCategories[resultId];
    
    if (!selectedCategory) {
      alert("Please select a category first!");
      return;
    }

    try {
      const response = await fetch("/feedback", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          id: resultId,
          userFeedback: "user_selected",
          correctedCategory: selectedCategory
        })
      });

      if (response.ok) {
        const feedbackSection = document.querySelector(`#confirmation-${resultId}`).closest('.feedback-section');
        feedbackSection.style.opacity = "0.3";
        feedbackSection.style.pointerEvents = "none";
        
        feedbackSection.innerHTML = `
          <div style="text-align: center; padding: 20px; color: #28a745; font-weight: bold;">
            ✓ Added to your ${formatCategoryName(selectedCategory)} list!
          </div>
        `;
        
      } else {
        alert("Failed to save to list");
      }
    } catch (error) {
      console.error("Save error:", error);
      alert("Error saving to list");
    }
  }

  async function viewMyList() {
    try {
      const response = await fetch("/my-list");
      const data = await response.json();
      
      const resultBox = document.getElementById("resultBox");
      const feedbackContainer = document.getElementById("feedbackContainer");
      const previewContainer = document.getElementById("previewContainer");
      
      previewContainer.innerHTML = "";
      feedbackContainer.innerHTML = "";
      
      if (data.total === 0) {
        resultBox.innerHTML = "📝 Your list is empty. Upload some screenshots and add them to your list!";
        resultBox.style.display = "block";
        return;
      }
      
      let html = `<h3>📋 My List (${data.total} items)</h3><br>`;
      
      const sortedCategories = Object.entries(data.categories).sort(([catA, itemsA], [catB, itemsB]) => {
        const avgConfA = itemsA.reduce((sum, item) => sum + item.confidence, 0) / itemsA.length;
        const avgConfB = itemsB.reduce((sum, item) => sum + item.confidence, 0) / itemsB.length;
        return avgConfB - avgConfA;
      });
      
      sortedCategories.forEach(([category, items]) => {
        const avgConfidence = (items.reduce((sum, item) => sum + item.confidence, 0) / items.length).toFixed(1);
        
        html += `
          <div style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
            <h4>${formatCategoryName(category)} (${items.length}) - Avg Confidence: ${avgConfidence}</h4>
            <div style="margin-top: 10px;">
        `;
        
        items.forEach(item => {
          html += `
            <div style="margin-bottom: 8px; padding: 8px; background: white; border-radius: 4px; font-size: 12px;">
              <strong>ID: ${item.id}</strong> - ${item.text}
              <br><small style="color: #666;">Confidence: ${item.confidence} | Added: ${new Date(item.createdAt).toLocaleDateString()}</small>
            </div>
          `;
        });
        
        html += `</div></div>`;
      });
      
      resultBox.innerHTML = html;
      resultBox.style.display = "block";
      
    } catch (error) {
      console.error("Error fetching list:", error);
      alert("Error loading your list");
    }
  }

  async function viewMyCategories() {
    try {
      const response = await fetch("/my-categories");
      const data = await response.json();
      
      const resultBox = document.getElementById("resultBox");
      const feedbackContainer = document.getElementById("feedbackContainer");
      const previewContainer = document.getElementById("previewContainer");
      
      previewContainer.innerHTML = "";
      feedbackContainer.innerHTML = "";
      
      if (data.total === 0) {
        resultBox.innerHTML = "📝 No categories yet. Upload some screenshots and add them to categories!";
        resultBox.style.display = "block";
        return;
      }
      
      let html = `<h3>🏷️ My Categories (${data.total} categories)</h3><br>`;
      html += `<p style="color: #666; margin-bottom: 20px;">Categories sorted by average model confidence</p>`;
      
      data.categories.forEach((cat, index) => {
        const confidenceColor = cat.avgConfidence >= 6 ? '#28a745' : 
                              cat.avgConfidence >= 4 ? '#ffc107' : '#dc3545';
        
        html += `
          <div style="margin-bottom: 15px; padding: 15px; background: white; border-radius: 8px; border-left: 4px solid ${confidenceColor};">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <h4 style="margin: 0;">${formatCategoryName(cat.finalCategory)}</h4>
                <p style="margin: 5px 0; color: #666; font-size: 14px;">
                  ${cat.count} items | Avg Confidence: <strong style="color: ${confidenceColor}">${cat.avgConfidence.toFixed(1)}</strong>
                </p>
              </div>
              <div style="text-align: right;">
                <span style="font-size: 24px; font-weight: bold; color: ${confidenceColor};">
                  #${index + 1}
                </span>
              </div>
            </div>
          </div>
        `;
      });
      
      resultBox.innerHTML = html;
      resultBox.style.display = "block";
      
    } catch (error) {
      console.error("Error fetching categories:", error);
      alert("Error loading categories");
    }
  }

  // Handle URL parameters on page load
  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action');
    
    if (action === 'list') {
      viewMyList();
    } else if (action === 'categories') {
      viewMyCategories();
    }
  };
</script>

</body>
</html>
